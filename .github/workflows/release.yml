name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Crate version to release (for example 1.0.0)
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release branch
        run: |
          test "${GITHUB_REF}" = "refs/heads/main" || {
            echo "Release workflow must run from refs/heads/main, got ${GITHUB_REF}" >&2
            exit 1
          }

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Bump versioned files
        run: bash scripts/bump-version.sh "${{ inputs.version }}"

      - name: Verify changelog entry exists for release version
        run: grep -q "^## \[${{ inputs.version }}\]" CHANGELOG.md

      - name: Validate crate metadata
        run: cargo metadata --no-deps --format-version 1 > /dev/null

      - name: Run format check
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features --verbose

      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Commit release version bump
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
        run: |
          git add Cargo.toml README.md CHANGELOG.md Cargo.lock
          git commit -m "Release v${{ inputs.version }}"

      - name: Verify package can be published
        run: cargo publish --dry-run

      - name: Create release tag
        run: git tag "v${{ inputs.version }}"

      - name: Push release commit and tag
        run: git push origin HEAD:main --follow-tags

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
